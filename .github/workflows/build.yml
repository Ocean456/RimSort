name: Build
on:
  workflow_call:
    inputs:
      version_format:
        description: "Versioning format"
        required: false
        type: string
        default: "v${major}.${minor}.${patch}"
      attest:
        description: "Generate attestations"
        required: false
        type: boolean
        default: true
  # checkov:skip=CKV_GHA_7
  workflow_dispatch:
    inputs:
      version_format:
        description: "Versioning format"
        required: false
        type: string
        default: "v${major}.${minor}.${patch}"
      attest:
        description: "Generate attestations"
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  build:
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            platform: "Darwin"
            arch: "i386"
            env:
              BUILD_OUTPUT: "__main__.app"
              Executable: RimSort
          - os: macos-latest
            platform: "Darwin"
            arch: "arm"
            env:
              BUILD_OUTPUT: "__main__.app"
              Executable: RimSort
          - os: ubuntu-22.04
            platform: "Ubuntu-22.04"
            arch: "x86_64"
            env:
              BUILD_OUTPUT: "__main__.dist"
              Executable: "RimSort"
          - os: ubuntu-24.04
            platform: "Ubuntu-24.04"
            arch: "x86_64"
            env:
              BUILD_OUTPUT: "__main__.dist"
              Executable: RimSort
          - os: windows-latest
            platform: "Windows"
            arch: "x86_64"
            env:
              BUILD_OUTPUT: "__main__.dist"
              Executable: RimSort.exe
    steps:
      - name: Check-out repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Add submodules to pythonpath
        id: pythonpath
        run: |
          if [ "${{ matrix.platform }}" == "Windows" ]; then
            echo "PYTHONPATH=$PYTHONPATH;${{ github.workspace }}\submodules\SteamworksPy" >> "$GITHUB_OUTPUT"
          else
            echo "PYTHONPATH=$PYTHONPATH:${{ github.workspace }}/submodules/SteamworksPy" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Remove problematic brew libs
        run: |
          brew remove --force --ignore-dependencies openssl@3
          brew cleanup openssl@3
        if: runner.os == 'macos' && matrix.arch == 'i386'

      - name: Get semantic version
        id: sem_version
        uses: PaulHatch/semantic-version@v5.4.0
        with:
          version_format: "${{ inputs.version_format }}"
          change_path: "app libs submodules themes"

      - name: Make (overwrite) version.xml
        id: version_xml
        run: |
          rm -f version.xml
          {
          echo "<version>"
          echo "  <version>${{ steps.sem_version.outputs.version  }}</version>"
          echo "  <major>${{ steps.sem_version.outputs.major }}</major>"
          echo "  <minor>${{ steps.sem_version.outputs.minor }}</minor>"
          echo "  <patch>${{ steps.sem_version.outputs.patch }}</patch>"
          echo "  <increment>${{ steps.sem_version.outputs.increment }}</increment>"
          echo "  <commit>${{ steps.sem_version.outputs.current_commit   }}</commit>"
          echo "  <tag>${{ steps.sem_version.outputs.version_tag  }}</tag>"
          echo "</version>"
          } >> version.xml
        shell: bash

      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version: "3.12"
          architecture: "x64" # optional x64 or x86. Defaults to x64 if not specified
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install Dependencies
        run: pip install -r requirements.txt -r requirements_build.txt

      - name: Build Actions
        shell: bash
        run: |
          set -e
          python distribute.py \
          --skip-pip \
          --product-version='${{ steps.sem_version.outputs.major }}.
            ${{ steps.sem_version.outputs.minor }}.
            ${{ steps.sem_version.outputs.patch }}.
            ${{ steps.sem_version.outputs.increment }}' \
          --skip-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        uses: Nuitka/Nuitka-Action@main
        if: true
        with:
          nuitka-version: main
          script-name: app/__main__.py
          mode: ${{ runner.os == 'macos' && 'app' || 'standalone' }}
          static-libpython: auto
          product-version: >-
            ${{ steps.sem_version.outputs.major }}.
            ${{ steps.sem_version.outputs.minor }}.
            ${{ steps.sem_version.outputs.patch }}.
            ${{ steps.sem_version.outputs.increment }}
          file-description: "RimSort"
          include-data-files: |
            version.xml=version.xml
        env:
          PYTHONPATH: ${{ steps.pythonpath.outputs.PYTHONPATH }}

      - name: Set FILENAME
        id: filename
        run: |
          FILENAME="${{ matrix.platform }}_"
          FILENAME+="${{ matrix.arch }}"
          echo "FILENAME=$FILENAME" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Find Executable
        id: find_executable
        run: |
          executable=$(find . -name "${{ matrix.env.Executable }}" | head -n 1)
          echo "EXECUTABLE=$executable" >> "$GITHUB_OUTPUT"
          echo "Executable found at $executable"
        shell: bash

      - name: Create MSI Package
        if: matrix.platform == 'Windows'
        run: |
          choco install wixtoolset -y
          
          $env:PATH += ";C:\Program Files (x86)\WiX Toolset v3.11\bin"
          
          if (-not (Test-Path "build\__main__.dist")) {
            throw "Build directory not found: build\__main__.dist"
          }
          
          heat.exe dir "build\__main__.dist" `
            -cg MainDist `
            -dr INSTALLFOLDER `
            -gg -sfrag -sreg -srd `
            -var var.DistDir `
            -t exclude_temp.xslt `
            -out maindist.wxs
          
          if ($LASTEXITCODE -ne 0) {
            throw "heat.exe failed with exit code $LASTEXITCODE"
          }
          
          $wixContent = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
            <Product Id="*" 
                     Name="RimSort" 
                     Language="1033" 
                     Version="${{ steps.sem_version.outputs.major }}.${{ steps.sem_version.outputs.minor }}.${{ steps.sem_version.outputs.patch }}.${{ steps.sem_version.outputs.increment }}" 
                     Manufacturer="RimSort Team" 
                     UpgradeCode="d4f7c3b9-8a5e-4e52-bb9f-3c2d1f7a9e24">
          
              <Package InstallerVersion="405" 
                       Compressed="yes" 
                       InstallScope="perMachine" 
                       Description="RimWorld mod management tool"
                       Comments="RimSort - Efficient mod sorting for RimWorld"
                       Keywords="RimWorld,Mods,Gaming,Management" />
          
              <MajorUpgrade DowngradeErrorMessage="A newer version of [ProductName] is already installed." 
                            AllowSameVersionUpgrades="yes" />
          
              <MediaTemplate EmbedCab="yes" />
          
              <Property Id="DistDir" Value="build\__main__.dist" />
              <Property Id="ARPPRODUCTICON" Value="RimSortIcon" />
              <Property Id="ARPHELPLINK" Value="https://github.com/RimSort/RimSort" />
              <Property Id="ARPURLINFOABOUT" Value="https://github.com/RimSort/RimSort" />
              <Property Id="ARPNOREPAIR" Value="yes" />
          
              <Property Id="INSTALLFOLDER">
                <RegistrySearch Id="PreviousInstallDirSearch" 
                               Root="HKLM" 
                               Key="Software\RimSort" 
                               Name="InstallDir" 
                               Type="raw" />
              </Property>
          
              <CustomAction Id="SetDefaultInstallDir" Script="vbscript" Execute="immediate">
                <![CDATA[
                  Dim fso, installDir, programFiles
                  Set fso = CreateObject("Scripting.FileSystemObject")
          
                  installDir = Session.Property("INSTALLFOLDER")
          
                  If installDir = "" Then
                    If fso.DriveExists("D:\") And fso.FolderExists("D:\Program Files") Then
                      installDir = "D:\Program Files\RimSort"
                    ElseIf Len(Environ("ProgramW6432")) > 0 Then
                      installDir = Environ("ProgramW6432") & "\RimSort"
                    Else
                      installDir = Environ("ProgramFiles") & "\RimSort"
                    End If
                    Session.Property("INSTALLFOLDER") = installDir
                  End If
                ]]>
              </CustomAction>
          
              <Icon Id="RimSortIcon" SourceFile="themes\default-icons\AppIcon.ico" />
          
              <Directory Id="TARGETDIR" Name="SourceDir">
                <Directory Id="ProgramFiles64Folder">
                  <Directory Id="INSTALLFOLDER" Name="RimSort" />
                </Directory>
                <Directory Id="ProgramMenuFolder">
                  <Directory Id="ApplicationProgramsFolder" Name="RimSort"/>
                </Directory>
                <Directory Id="DesktopFolder" Name="Desktop" />
              </Directory>
          
              <Feature Id="ProductFeature" Title="RimSort Application" Level="1" Description="Main RimSort application">
                <ComponentGroupRef Id="MainDist" />
                <ComponentGroupRef Id="ShortcutComponents" />
                <ComponentGroupRef Id="RegistryComponents" />
              </Feature>
          
              <Feature Id="DesktopShortcutFeature" Title="Desktop Shortcut" Level="1" Description="Create desktop shortcut">
                <ComponentGroupRef Id="DesktopShortcutComponents" />
              </Feature>
          
              <UIRef Id="WixUI_FeatureTree" />
              <Property Id="WIXUI_INSTALLDIR" Value="INSTALLFOLDER" />
          
              <WixVariable Id="WixUILicenseRtf" Value="License.rtf" />
              <WixVariable Id="WixUIBannerBmp" Value="Banner.bmp" />
              <WixVariable Id="WixUIDialogBmp" Value="Dialog.bmp" />
          
              <InstallExecuteSequence>
                <Custom Action="SetDefaultInstallDir" After="ValidateProductID">NOT Installed</Custom>
              </InstallExecuteSequence>
          
              <InstallUISequence>
                <Custom Action="SetDefaultInstallDir" After="ValidateProductID">NOT Installed</Custom>
              </InstallUISequence>

              <ComponentGroup Id="ShortcutComponents" Directory="ApplicationProgramsFolder">
                <Component Id="StartMenuShortcut" Guid="3C5F5459-99AE-5A3E-0422-E64DA66B4443">
                  <RegistryValue Root="HKLM"
                                Key="Software\RimSort\StartMenu"
                                Name="installed"
                                Type="integer"
                                Value="1"
                                KeyPath="yes" />
                  <Shortcut Id="ApplicationStartMenuShortcut"
                            Directory="ApplicationProgramsFolder"
                            Name="RimSort"
                            Target="[INSTALLFOLDER]RimSort.exe"
                            WorkingDirectory="INSTALLFOLDER"
                            Icon="RimSortIcon"
                            IconIndex="0"
                            Advertise="no"
                            Description="RimWorld mod management tool" />
                  <util:InternetShortcut Id="WebsiteShortcut"
                                        Directory="ApplicationProgramsFolder"
                                        Name="RimSort Website"
                                        Target="https://github.com/RimSort/RimSort" />
                  <RemoveFolder Id="RemoveApplicationProgramsFolder"
                                Directory="ApplicationProgramsFolder"
                                On="uninstall" />
                </Component>
              </ComponentGroup>

              <ComponentGroup Id="DesktopShortcutComponents" Directory="DesktopFolder">
                <Component Id="DesktopShortcut" Guid="B8E7F3C2-1A4D-5E6F-9C8B-7A5E3D2F1C4B">
                  <RegistryValue Root="HKLM"
                                Key="Software\RimSort\Desktop"
                                Name="installed"
                                Type="integer"
                                Value="1"
                                KeyPath="yes" />
                  <Shortcut Id="ApplicationDesktopShortcut"
                            Directory="DesktopFolder"
                            Name="RimSort"
                            Target="[INSTALLFOLDER]RimSort.exe"
                            WorkingDirectory="INSTALLFOLDER"
                            Icon="RimSortIcon"
                            IconIndex="0"
                            Advertise="no"
                            Description="RimWorld mod management tool" />
                </Component>
              </ComponentGroup>
          
              <ComponentGroup Id="RegistryComponents" Directory="INSTALLFOLDER">
                <Component Id="MainRegistry" Guid="A1B2C3D4-E5F6-7890-ABCD-EF1234567890">
                  <RegistryValue Root="HKLM"
                                Key="Software\RimSort"
                                Name="InstallDir"
                                Type="string"
                                Value="[INSTALLFOLDER]"
                                KeyPath="yes" />
                  <RegistryValue Root="HKLM"
                                Key="Software\RimSort"
                                Name="Version"
                                Type="string"
                                Value="${{ steps.sem_version.outputs.version }}" />
                  <RegistryValue Root="HKLM"
                                Key="Software\RimSort"
                                Name="InstallDate"
                                Type="string"
                                Value="[Date]" />
                </Component>
          
                <Component Id="FileAssociation" Guid="F1E2D3C4-B5A6-9807-CDEF-123456789ABC">
                  <RegistryValue Root="HKLM"
                                Key="Software\Classes\.rimsort"
                                Value="RimSort.Document"
                                Type="string"
                                KeyPath="yes" />
                  <RegistryValue Root="HKLM"
                                Key="Software\Classes\RimSort.Document"
                                Value="RimSort Configuration File"
                                Type="string" />
                  <RegistryValue Root="HKLM"
                                Key="Software\Classes\RimSort.Document\DefaultIcon"
                                Value="[INSTALLFOLDER]RimSort.exe,0"
                                Type="string" />
                  <RegistryValue Root="HKLM"
                                Key="Software\Classes\RimSort.Document\shell\open\command"
                                Value="&quot;[INSTALLFOLDER]RimSort.exe&quot; &quot;%1&quot;"
                                Type="string" />
                </Component>
              </ComponentGroup>
            </Product>
          </Wix>
          "@
          
          $wixContent | Out-File -FilePath "RimSort.wxs" -Encoding UTF8 -NoNewline
          
          Write-Host "Compiling WiX sources..."
          candle.exe `
            -dDistDir="build\__main__.dist" `
            -arch x64 `
            maindist.wxs RimSort.wxs
          
          if ($LASTEXITCODE -ne 0) {
            throw "candle.exe failed with exit code $LASTEXITCODE"
          }
          
          Write-Host "Linking MSI package..."
          light.exe `
            -ext WixUIExtension `
            -ext WixUtilExtension `
            -cultures:en-us `
            -loc Localization.wxl `
            maindist.wixobj RimSort.wixobj `
            -o "RimSort-${{ steps.sem_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.msi"
          
          if ($LASTEXITCODE -ne 0) {
            throw "light.exe failed with exit code $LASTEXITCODE"
          }
          
          Write-Host "MSI package created successfully!"
        shell: powershell

      - name: Generate executable attestations
        uses: actions/attest-build-provenance@v2.4.0
        if: ${{ inputs.attest }}
        with:
          subject-path: ${{ steps.find_executable.outputs.EXECUTABLE }}

      - name: Generate MSI attestation
        uses: actions/attest-build-provenance@v2.4.0
        if: ${{ inputs.attest && matrix.platform == 'Windows' }}
        with:
          subject-path: ./RimSort-${{ steps.sem_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.msi

      - name: Rename new build
        run: |
          cd build
          mv "${{ matrix.env.BUILD_OUTPUT }}" "output"
          tar -cvf "${{ steps.filename.outputs.FILENAME }}.tar" "output" 
          rm -rf "output"
        shell: bash

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2.4.0
        if: ${{ inputs.attest }}
        with:
          subject-path: ./build/${{ steps.filename.outputs.FILENAME }}.tar

        # Upload folder as artifact
      - name: Upload folder as artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ steps.filename.outputs.FILENAME }}
          path: ./build/${{ steps.filename.outputs.FILENAME }}.tar
          if-no-files-found: error

      # Upload the built executable
      - name: Upload MSI Package
        if: matrix.platform == 'Windows'
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.platform }}_${{ matrix.arch }}_msi
          path: ./RimSort-${{ steps.sem_version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.msi
          if-no-files-found: error

    outputs:
      filename: ${{ steps.filename.outputs.FILENAME }}

  post-build-test:
    needs: build
    uses: ./.github/workflows/test_builds.yml